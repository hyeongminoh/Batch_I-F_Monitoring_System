services:

  # ── ollama: EXAONE LLM 서빙 (상시 실행) ─────────────────────
  ollama:
    image: ollama/ollama
    container_name: batch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ollama-init: EXAONE 모델 최초 1회 자동 pull 후 종료 ──────
  ollama-init:
    image: ollama/ollama
    container_name: batch-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "exaone3.5:2.4b"]
    restart: "no"

  # ── app: batch-monitor 이미지 빌드 전용 ──────────────────────
  # 'docker compose --profile build build' 로만 사용
  # 실행되지 않음 - 이미지 빌드 목적
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: batch-monitor
    profiles: ["build"]

volumes:
  ollama-models:

networks:
  default:
    name: batch-monitor
